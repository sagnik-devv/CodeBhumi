<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Already Registered - CodeBhumi</title>
  
  <link rel="icon" type="image/jpeg" href="Org%20Logo.jpeg?v=2">
  <link rel="apple-touch-icon" href="Org%20Logo.jpeg?v=2">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary, #0B1121);
      transition: background-color 0.4s ease;
    }
    
    .top-actions {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 50;
    }
    
    .theme-toggle-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s;
    }

    [data-theme="light"] .theme-toggle-btn {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.1);
      color: #1C1917;
    }

    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 1;
      pointer-events: none;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
    }

    [data-theme="light"] .bg-animation {
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(245, 158, 11, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
    }

    .success-container {
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(30, 58, 138, 0.2));
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 30px;
      padding: 4rem 3rem;
      text-align: center;
      max-width: 650px;
      width: 90%;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      z-index: 10;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transform: translateY(50px);
      opacity: 0;
      animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    [data-theme="light"] .success-container {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(246, 246, 244, 0.8));
      border: 1px solid rgba(245, 158, 11, 0.4);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    @keyframes slideUpFade {
      100% { transform: translateY(0); opacity: 1; }
    }

    .icon-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 2.5rem;
    }

    .success-svg {
      width: 100%;
      height: 100%;
      z-index: 2;
      position: relative;
    }

    .success-svg circle.main-circle {
      stroke-dasharray: 260;
      stroke-dashoffset: 260;
      animation: drawCircle 1s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      animation-delay: 0.2s;
    }

    .success-svg line {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawCheck 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      animation-delay: 0.8s;
    }
    
    .success-svg circle.dot {
      opacity: 0;
      animation: fadeInText 0.4s forwards;
      animation-delay: 1.2s;
    }

    @keyframes drawCircle {
      100% { stroke-dashoffset: 0; }
    }

    @keyframes drawCheck {
      100% { stroke-dashoffset: 0; }
    }

    .icon-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 130px;
      height: 130px;
      background: rgba(245, 158, 11, 0.4);
      filter: blur(30px);
      border-radius: 50%;
      z-index: 1;
      animation: pulseGlow 3s infinite alternate;
      animation-delay: 1.5s;
      opacity: 0;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
    }

    .success-container h1 {
      font-size: 3.5rem;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 1rem;
      letter-spacing: -1px;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      animation: fadeInText 0.8s ease forwards;
      animation-delay: 1s;
    }

    [data-theme="light"] .success-container h1 {
      background: linear-gradient(to right, #1C1917, #3B82F6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .success-container p {
      color: var(--text-muted);
      font-size: 1.25rem;
      margin-bottom: 3rem;
      line-height: 1.6;
      opacity: 0;
      animation: fadeInText 0.8s ease forwards;
      animation-delay: 1.3s;
    }

    .action-box {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .action-btn {
      opacity: 0;
      animation: popBtn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .delay-1 {
      animation-delay: 1.6s;
    }

    @keyframes fadeInText {
      100% { opacity: 1; }
    }

    @keyframes popBtn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 600px) {
      .success-container {
        padding: 2.5rem 1.5rem;
        border-radius: 20px;
      }
      .success-container h1 {
        font-size: 2.2rem;
      }
      .success-container p {
        font-size: 1.1rem;
        margin-bottom: 2rem;
      }
      .icon-wrapper {
        width: 90px;
        height: 90px;
        margin-bottom: 1.5rem;
      }
      .action-box .btn {
        width: 100%;
      }
    }

    @media (pointer: fine) {
      * { cursor: auto !important; }
      a, button { cursor: pointer !important; }
      .cursor-dot, .cursor-outline { display: none !important; }
    }
  </style>
</head>
<body>
  <!-- Theme Toggle -->
  <div class="top-actions">
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
      <i class="fa-solid fa-sun"></i>
    </button>
  </div>

  <!-- Ambient Background -->
  <div class="bg-animation"></div>
  <div class="hero-grid" style="position: fixed; opacity: 0.2;"></div>
  
  <div class="success-container">
    <div class="icon-wrapper">
      <div class="icon-glow"></div>
      <svg class="success-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle class="main-circle" cx="50" cy="50" r="40" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
        <line x1="50" y1="30" x2="50" y2="55" fill="none" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
        <circle class="dot" cx="50" cy="70" r="4" fill="#fcd34d"/>
      </svg>
    </div>
    
    <h1>Already Registered!</h1>
    <p>We found an existing application with your Registration ID in our system.<br>Hold tight! Our team will get back to you soon regarding your application status.</p>
    
    <div class="action-box">
      <a href="index.html" class="btn btn-primary btn-large hover-lift action-btn delay-1">
        <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Return to Home
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
