<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Submitted - CodeBhumi</title>
  
  <link rel="icon" type="image/jpeg" href="Org Logo.jpg">
  <link rel="apple-touch-icon" href="Org Logo.jpg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    
    .success-container {
      background: var(--gradient-card);
      border: 1px solid var(--color-green-light);
      border-radius: 24px;
      padding: 5rem 3rem;
      text-align: center;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 20px 50px rgba(16, 185, 129, 0.15);
      position: relative;
      z-index: 10;
      backdrop-filter: blur(10px);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .success-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 2rem;
      border: 4px solid var(--color-green-light);
      padding: 4px;
      background: var(--card-bg);
      animation: pulseGlow 2s infinite alternate;
    }

    .success-logo img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      100% { box-shadow: 0 0 20px 10px rgba(16, 185, 129, 0.1); }
    }

    .success-container h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .success-container p {
      color: var(--text-muted);
      font-size: 1.15rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    @media (pointer: fine) {
      * { cursor: auto !important; }
      a, button { cursor: pointer !important; }
      .cursor-dot, .cursor-outline { display: none !important; }
    }
  </style>
</head>
<body>
  <!-- Background Elements -->
  <div class="hero-bg" style="position: fixed;">
    <div class="hero-grid"></div>
  </div>
  <div class="hero-glow glow-1" style="top: -10%; left: 0%;"></div>
  <div class="hero-glow glow-2" style="bottom: -10%; right: 0%;"></div>

  <div class="success-container">
    <div class="success-logo">
      <img src="Org Logo.jpg" alt="CodeBhumi Logo">
    </div>
    <h1>Application Submitted!</h1>
    <p>Your form has been submitted successfully.<br>We are looking forward to seeing you at <strong class="text-gradient">CodeBhumi</strong>!</p>
    <a href="index.html" class="btn btn-primary btn-large hover-lift">Return to Home</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
